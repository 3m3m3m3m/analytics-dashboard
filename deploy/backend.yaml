apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: backend
          image: busybox
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: database-url
            - name: ONEINCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: oneinch-api-key
            - name: ARKHAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: arkham-api-key
            - name: ETHERSCAN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: etherscan-api-key
            - name: INFURA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: infura-api-key
            - name: ALCHEMY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: alchemy-api-key
            - name: LIFI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: lifi-api-key
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
