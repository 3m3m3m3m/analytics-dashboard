name: Build and Push Images

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NS: analytics-dashboard

jobs:
  build-backend:
    uses: ./.github/workflows/build-push-image.yaml
    permissions:
      contents: read
      packages: write
    with:
      service: backend
      context: ./vultisig-analytics
      dockerfile: ./vultisig-analytics/Dockerfile
      registry: ghcr.io
      image_name: ${{ github.repository }}
      tag: ${{ github.event.release.tag_name }}
      additional_tag: latest

  build-sync:
    uses: ./.github/workflows/build-push-image.yaml
    permissions:
      contents: read
      packages: write
    with:
      service: sync
      context: ./vultisig-analytics
      dockerfile: ./vultisig-analytics/Dockerfile.sync
      registry: ghcr.io
      image_name: ${{ github.repository }}
      tag: ${{ github.event.release.tag_name }}
      additional_tag: latest

  update-manifests:
    needs: [build-backend, build-sync]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update deployment files with new image tags
        run: |
          TAG="${{ github.event.release.tag_name }}"

          sed -i "s|image: ghcr.io/${{ env.IMAGE_NAME }}/backend:.*|image: ghcr.io/${{ env.IMAGE_NAME }}/backend:${TAG}|" deploy/backend.yaml
          sed -i "s|image: busybox|image: ghcr.io/${{ env.IMAGE_NAME }}/backend:${TAG}|" deploy/backend.yaml

          sed -i "s|image: ghcr.io/${{ env.IMAGE_NAME }}/sync:.*|image: ghcr.io/${{ env.IMAGE_NAME }}/sync:${TAG}|" deploy/sync.yaml
          sed -i "s|image: busybox|image: ghcr.io/${{ env.IMAGE_NAME }}/sync:${TAG}|" deploy/sync.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/
          git commit -m "chore: update image tags to ${{ github.event.release.tag_name }}" || echo "No changes to commit"
          git push origin main
