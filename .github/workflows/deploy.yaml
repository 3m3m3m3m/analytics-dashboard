name: Build and Deploy

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CLUSTER: plugins-prod-k8s
  NS: analytics-dashboard

jobs:
  build-backend:
    uses: ./.github/workflows/build-push-image.yaml
    permissions:
      contents: read
      packages: write
    with:
      service: backend
      context: ./vultisig-analytics
      dockerfile: ./vultisig-analytics/Dockerfile
      registry: ghcr.io
      image_name: ${{ github.repository }}
      tag: ${{ github.event.release.tag_name }}
      additional_tag: latest

  build-sync:
    uses: ./.github/workflows/build-push-image.yaml
    permissions:
      contents: read
      packages: write
    with:
      service: sync
      context: ./vultisig-analytics
      dockerfile: ./vultisig-analytics/Dockerfile.sync
      registry: ghcr.io
      image_name: ${{ github.repository }}
      tag: ${{ github.event.release.tag_name }}
      additional_tag: latest

  deploy:
    needs: [build-backend, build-sync]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_CI_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER }}

      - name: Update deployment files
        run: |
          TAG="${{ github.event.release.tag_name }}"

          sed -i "s|image: busybox|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${TAG}|" deploy/backend.yaml
          sed -i "s|image: busybox|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/sync:${TAG}|" deploy/sync.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl -n ${{ env.NS }} apply -f deploy/
          kubectl -n ${{ env.NS }} apply -f deploy/prod/

          kubectl -n ${{ env.NS }} rollout status deployment/backend --timeout=300s
          kubectl -n ${{ env.NS }} rollout status deployment/sync --timeout=300s
